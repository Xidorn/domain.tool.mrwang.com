<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Name Combiner + Whois</title>
<style>
body { font-family: Arial; margin:40px; background:#f5f7fa; color:#333; }
h1 { color:#4BB7A8; }
input, button { padding:8px; font-size:16px; }
input { width:200px; }
button { margin-left:8px; background:#4BB7A8; color:#fff; border:none; cursor:pointer; }
button:hover { background:#3aa595; }
ul { list-style:none; padding-left:0; max-height:200px; overflow:auto; background:#fff; padding:10px; border-radius:5px; box-shadow:0 0 8px rgba(0,0,0,0.1);}
li { padding:4px 0; display:flex; justify-content:space-between; align-items:center; }
.copyBtn { margin-top:10px; padding:6px 12px; font-size:14px; cursor:pointer; background:#4BB7A8; color:#fff; border:none; border-radius:3px; }
.copyBtn:hover { background:#3aa595; }
a.whois { font-size:12px; color:#4BB7A8; margin-left:6px; text-decoration:none; }
a.whois:hover { text-decoration:underline; }
.status-available { color:green; }
.status-registered { color:red; }
.column { margin-bottom:30px; }
.column h3 { margin:10px 0 5px; }
</style>
</head>
<body>

<h1>Web3 Name Combiner + Whois</h1>

<p>输入你的词：</p>
<input type="text" id="inputWord" placeholder="输入词...">
<button onclick="generateCombinations()">生成组合</button>
<button onclick="checkAllWhois()">检查 Whois</button>

<div class="column">
<h2>前缀组合 (输入词在前)</h2>
<h3>未注册</h3>
<ul id="prefixAvailable"></ul>
<button class="copyBtn" onclick="copyAvailable('prefixAvailable')">复制前缀未注册</button>
<h3>已注册</h3>
<ul id="prefixRegistered"></ul>
</div>

<div class="column">
<h2>后缀组合 (输入词在后)</h2>
<h3>未注册</h3>
<ul id="suffixAvailable"></ul>
<button class="copyBtn" onclick="copyAvailable('suffixAvailable')">复制后缀未注册</button>
<h3>已注册</h3>
<ul id="suffixRegistered"></ul>
</div>

<script>
let words = [];
let prefixDomains = [];
let suffixDomains = [];

// 自动加载本地 word.txt
fetch('word.txt')
  .then(res => res.text())
  .then(data => {
    words = data.split(/\r?\n/).map(w => w.trim()).filter(Boolean);
    console.log(`已加载 ${words.length} 个单词`);
  })
  .catch(err => console.error("加载 word.txt 失败:", err));

// 生成前后缀组合
function generateCombinations() {
  const input = document.getElementById("inputWord").value.trim().toLowerCase();
  if (!input) { alert("请输入你的词！"); return; }
  if (!words.length) { alert("词库未加载完成！"); return; }

  prefixDomains = [];
  suffixDomains = [];

  words.forEach(word => {
    const w = word.toLowerCase();
    prefixDomains.push(input + w + ".com");
    suffixDomains.push(w + input + ".com");
  });

  alert(`已生成组合: 前缀 ${prefixDomains.length} 个，后缀 ${suffixDomains.length} 个`);
}

// 批量检查 Whois
async function checkAllWhois() {
  if (!prefixDomains.length && !suffixDomains.length) { alert("请先生成组合"); return; }

  const prefixAvailable = document.getElementById('prefixAvailable');
  const prefixRegistered = document.getElementById('prefixRegistered');
  const suffixAvailable = document.getElementById('suffixAvailable');
  const suffixRegistered = document.getElementById('suffixRegistered');

  // 清空
  prefixAvailable.innerHTML = '';
  prefixRegistered.innerHTML = '';
  suffixAvailable.innerHTML = '';
  suffixRegistered.innerHTML = '';

  async function checkList(domains, availableUl, registeredUl) {
    for (const domain of domains) {
      try {
        const res = await fetch(`https://api.mrwang.com/whois.php?domain=${domain}`);
        const data = await res.json();

        const li = document.createElement('li');
        const spanDomain = document.createElement('span');
        spanDomain.textContent = domain;

        const whoisLink = document.createElement('a');
        whoisLink.href = `https://wxscx.com/${domain}`;
        whoisLink.target = '_blank';
        whoisLink.className = 'whois';
        whoisLink.textContent = 'Whois';

        li.appendChild(spanDomain);
        li.appendChild(whoisLink);

        if (data.data.registered) {
          li.classList.add('status-registered');
          registeredUl.appendChild(li);
        } else {
          li.classList.add('status-available');
          availableUl.appendChild(li);
        }
      } catch (err) {
        console.error('Whois error', domain, err);
      }
    }
  }

  // 分别检查前缀和后缀
  await checkList(prefixDomains, prefixAvailable, prefixRegistered);
  await checkList(suffixDomains, suffixAvailable, suffixRegistered);

  alert("Whois 检查完成！");
}

// 一键复制未注册
function copyAvailable(listId) {
  const ul = document.getElementById(listId);
  const text = Array.from(ul.children).map(li => li.querySelector('span').textContent).join("\n");
  navigator.clipboard.writeText(text)
    .then(() => alert("已复制未注册域名到剪贴板！"))
    .catch(err => alert("复制失败：" + err));
}
</script>

</body>
</html>
