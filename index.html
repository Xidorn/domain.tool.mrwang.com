<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Tools</title>
    <style>
        :root {
            --primary: #4BB7A8;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
            --success: #22c55e;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text);
            display: flex; justify-content: center; padding: 40px 20px;
        }

        .container { max-width: 1000px; width: 100%; }
        header { text-align: center; margin-bottom: 25px; }
        h1 { color: var(--primary); margin-bottom: 5px; font-weight: 800; }
        
        .search-box {
            background: var(--card); padding: 20px; border-radius: 16px;
            border: 1px solid var(--border); display: grid;
            grid-template-columns: 1fr 1fr 120px; gap: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; color: #94a3b8; margin-left: 5px; font-weight: bold; }

        input, textarea {
            padding: 12px; border-radius: 8px; border: 1px solid var(--border);
            background: #0b1120; color: white; font-size: 15px; outline: none;
            transition: 0.3s; width: 100%; box-sizing: border-box;
        }
        textarea { height: 88px; resize: vertical; font-family: inherit; }
        input:focus, textarea:focus { border-color: var(--primary); }

        .main-btn {
            align-self: flex-end; height: 48px; border-radius: 8px;
            border: none; background: var(--primary); color: white;
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .main-btn:hover { background: #3aa595; transform: translateY(-1px); }
        .main-btn:disabled { background: #475569; cursor: not-allowed; }

        .progress-wrap { margin-bottom: 20px; display: none; }
        .bar-bg { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        .panel-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .panel-h h2 { font-size: 1rem; margin: 0; color: var(--primary); }

        ul { 
            list-style: none; padding: 0; margin: 0; max-height: 350px; 
            overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 8px;
        }
        li { 
            padding: 10px 15px; border-bottom: 1px solid #33415566; 
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'JetBrains Mono', monospace; font-size: 13px;
        }
        .available { color: var(--success); font-weight: bold; background: rgba(34, 197, 94, 0.05); }
        .registered { color: #64748b; }

        .copy-btn {
            background: #334155; color: #cbd5e1; border: none;
            padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 11px;
        }
        .copy-btn:hover { background: var(--primary); color: white; }
        .whois-link { color: #94a3b8; text-decoration: none; font-size: 11px; border: 1px solid #475569; padding: 1px 5px; border-radius: 3px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Domain Tools</h1>
        <p style="font-size: 12px; opacity: 0.6;">优先级：手动词库 > word.txt > 内置 Web3 词库</p>
    </header>

    <div class="input-group" style="margin-bottom: 15px;">
        <label>手动词库 (一行一个，留空则自动调用外部或默认词库)</label>
        <textarea id="manualWords" placeholder="在此输入自定义词组..."></textarea>
    </div>

    <div class="search-box">
        <div class="input-group">
            <label>核心词</label>
            <input type="text" id="inputWord" placeholder="如: bit, meta" onkeypress="if(event.keyCode==13) startCombinedProcess()">
        </div>
        <div class="input-group">
            <label>后缀 (TLD)</label>
            <input type="text" id="inputSuffix" placeholder="com" value="com">
        </div>
        <button id="runBtn" class="main-btn" onclick="startCombinedProcess()">查询</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
        <div style="display:flex; justify-content:space-between; margin-bottom:6px; font-size:12px;">
            <span id="statusTxt">就绪</span>
            <span id="percentTxt">0%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
    </div>

    <div class="grid">
        <div class="panel">
            <div class="panel-h">
                <h2>前缀模式</h2>
                <button class="copy-btn" onclick="copyUnregistered('prefixList', this)">复制未注册</button>
            </div>
            <ul id="prefixList"></ul>
        </div>
        <div class="panel">
            <div class="panel-h">
                <h2>后缀模式</h2>
                <button class="copy-btn" onclick="copyUnregistered('suffixList', this)">复制未注册</button>
            </div>
            <ul id="suffixList"></ul>
        </div>
    </div>
</div>

<script>
// 1. 默认备用词库
const defaultWords = ["Alpha","Micro","Meta","Air","Snap","X","Cloud","Blockchain","Crypto","Token","Ledger","Protocol","Consensus","Validator","Node","Chain","Block","Smart","Contract","Oracle","Layer","Bridge","Rollup","Hash","Liquidity","Staking","Yield","Vault","Swap","Lending","Borrow","Pool","Farm","NFT","Mint","Core","Flux","Link","DeFi","Nest","Flow","Pixel","Aura"];
let fileWords = [];
const CONCURRENCY = 6; 

// 2. 预加载 word.txt
fetch('word.txt')
    .then(res => res.ok ? res.text() : Promise.reject())
    .then(data => {
        fileWords = data.split(/\r?\n/).map(w => w.trim()).filter(Boolean);
        console.log("word.txt 加载成功");
    }).catch(() => console.log("未发现 word.txt"));

async function startCombinedProcess() {
    const input = document.getElementById("inputWord").value.trim().toLowerCase();
    const suffix = document.getElementById("inputSuffix").value.trim().toLowerCase().replace(/^\./, '') || 'com';
    
    if (!input) return alert("请输入核心词");

    // 3. 词库选择优先级逻辑
    let activeWords = [];
    const manualInput = document.getElementById("manualWords").value.trim();
    
    if (manualInput) {
        // 优先级 1: 手动输入
        activeWords = manualInput.split(/\r?\n/).map(w => w.trim()).filter(Boolean);
        console.log("使用手动词库:", activeWords.length);
    } else if (fileWords.length > 0) {
        // 优先级 2: word.txt
        activeWords = fileWords;
        console.log("使用 word.txt 词库");
    } else {
        // 优先级 3: 默认
        activeWords = defaultWords;
        console.log("使用内置默认词库");
    }

    // UI 重置
    const runBtn = document.getElementById('runBtn');
    runBtn.disabled = true;
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('prefixList').innerHTML = '';
    document.getElementById('suffixList').innerHTML = '';

    let tasks = [];
    activeWords.forEach(w => {
        const cleanW = w.toLowerCase();
        tasks.push({ domain: `${input}${cleanW}.${suffix}`, type: 'prefix' });
        tasks.push({ domain: `${cleanW}${input}.${suffix}`, type: 'suffix' });
    });

    const total = tasks.length;
    let finished = 0;

    async function worker() {
        while (tasks.length > 0) {
            const item = tasks.shift();
            try {
                const res = await fetch(`https://api.mrwang.com/whois.php?domain=${item.domain}`);
                const data = await res.json();
                renderItem(item.domain, item.type, data.data.registered);
            } catch (e) { console.error(e); }
            finished++;
            updateProgress(finished, total);
        }
    }

    await Promise.all(Array(Math.min(CONCURRENCY, tasks.length)).fill(null).map(worker));
    runBtn.disabled = false;
    document.getElementById('statusTxt').innerText = "全部完成";
}

function renderItem(domain, type, isReg) {
    const ul = document.getElementById(type === 'prefix' ? 'prefixList' : 'suffixList');
    const li = document.createElement('li');
    li.className = isReg ? 'registered' : 'available';
    li.innerHTML = `
        <span class="domain-name">${domain}</span>
        <a href="https://wxscx.com/${domain}" target="_blank" class="whois-link">WHOIS</a>
    `;
    if (!isReg) ul.insertBefore(li, ul.firstChild);
    else ul.appendChild(li);
}

function updateProgress(done, total) {
    const p = Math.round((done / total) * 100);
    document.getElementById('barFill').style.width = p + '%';
    document.getElementById('percentTxt').innerText = p + '%';
    document.getElementById('statusTxt').innerText = `查询中: ${done}/${total}`;
}

// 彻底修复版复制
function copyUnregistered(ulId, btn) {
    const ul = document.getElementById(ulId);
    const domains = Array.from(ul.querySelectorAll('li.available .domain-name')).map(el => el.innerText.trim());
    
    if (domains.length === 0) return alert("无可用域名");

    const text = domains.join('\n');
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => showStatus(btn, domains.length));
    } else {
        const ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        showStatus(btn, domains.length);
    }
}

function showStatus(btn, count) {
    const original = btn.innerText;
    btn.innerText = `成功(${count})`;
    btn.style.background = "var(--success)";
    setTimeout(() => { btn.innerText = original; btn.style.background = ""; }, 1500);
}
</script>
</body>
</html>
