<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Name Combiner + Whois Batch</title>
<style>
body { font-family: Arial; margin:40px; background:#f5f7fa; color:#333; }
h1 { color:#4BB7A8; }
input, button { padding:8px; font-size:16px; }
input { width:200px; }
button { margin-left:8px; background:#4BB7A8; color:#fff; border:none; cursor:pointer; }
button:hover { background:#3aa595; }
.results { margin-top:20px; display:flex; gap:40px; flex-wrap:wrap; }
.column { flex:1; min-width:300px; }
ul { list-style:none; padding-left:0; max-height:400px; overflow:auto; background:#fff; padding:10px; border-radius:5px; box-shadow:0 0 8px rgba(0,0,0,0.1);}
li { padding:4px 0; display:flex; justify-content:space-between; align-items:center; }
.copyBtn { margin-top:10px; padding:6px 12px; font-size:14px; cursor:pointer; background:#4BB7A8; color:#fff; border:none; border-radius:3px; }
.copyBtn:hover { background:#3aa595; }
a.domain { color:#333; text-decoration:none; margin-right:6px; }
a.domain:hover { text-decoration:underline; }
a.whois { font-size:12px; color:#4BB7A8; margin-left:6px; }
a.whois:hover { text-decoration:underline; }
</style>
</head>
<body>

<h1>Web3 Name Combiner + Whois Batch</h1>

<p>输入你的词：</p>
<input type="text" id="inputWord" placeholder="输入词...">
<button onclick="generateCombinations()">生成组合</button>
<button onclick="checkAllWhois()">检查 Whois 状态</button>

<div class="results">
  <div class="column">
    <h2>前缀组合</h2>
    <h3>未注册</h3>
    <ul id="prefixAvailable"></ul>
    <h3>已注册</h3>
    <ul id="prefixRegistered"></ul>
    <button class="copyBtn" onclick="copyToClipboard('prefixAvailable')">复制未注册前缀</button>
    <button class="copyBtn" onclick="copyToClipboard('prefixRegistered')">复制已注册前缀</button>
  </div>
  <div class="column">
    <h2>后缀组合</h2>
    <h3>未注册</h3>
    <ul id="suffixAvailable"></ul>
    <h3>已注册</h3>
    <ul id="suffixRegistered"></ul>
    <button class="copyBtn" onclick="copyToClipboard('suffixAvailable')">复制未注册后缀</button>
    <button class="copyBtn" onclick="copyToClipboard('suffixRegistered')">复制已注册后缀</button>
  </div>
</div>

<script>
let words = [];
let prefixDomains = [];
let suffixDomains = [];

// 自动加载 /word.txt
fetch('word.txt')
  .then(res => res.text())
  .then(data => {
    words = data.split(/\r?\n/).map(w => w.trim()).filter(Boolean);
    console.log(`已加载 ${words.length} 个单词`);
  })
  .catch(err => console.error("加载 word.txt 失败:", err));

function generateCombinations() {
  const input = document.getElementById("inputWord").value.trim().toLowerCase();
  if (!input) { alert("请输入你的词！"); return; }
  if (!words.length) { alert("词库未加载完成！"); return; }

  prefixDomains = [];
  suffixDomains = [];

  // 清空列表
  ['prefixAvailable','prefixRegistered','suffixAvailable','suffixRegistered'].forEach(id => document.getElementById(id).innerHTML='');

  words.forEach(word => {
    const w = word.toLowerCase();
    prefixDomains.push(input + w + ".com");
    suffixDomains.push(w + input + ".com");
  });

  alert(`已生成组合：前缀 ${prefixDomains.length} 个，后缀 ${suffixDomains.length} 个`);
}

// 批量查询 Whois 状态
async function checkAllWhois() {
  if (!prefixDomains.length && !suffixDomains.length) { alert("请先生成组合"); return; }

  const lists = {
    prefix: { available: document.getElementById('prefixAvailable'), registered: document.getElementById('prefixRegistered') },
    suffix: { available: document.getElementById('suffixAvailable'), registered: document.getElementById('suffixRegistered') }
  };

  const allDomains = [
    ...prefixDomains.map(d => ({type:'prefix', domain:d})),
    ...suffixDomains.map(d => ({type:'suffix', domain:d}))
  ];

  // 批量查询，每次一个域名（可改为 Promise.all 限制并发）
  for (const item of allDomains) {
    try {
      const res = await fetch(`https://api.mrwang.com/whois.php?domain=${item.domain}`);
      const data = await res.json();

      const li = document.createElement('li');
      const domainLink = document.createElement('a');
      domainLink.href = `https://wxscx.com/${item.domain}`;
      domainLink.target = '_blank';
      domainLink.className = 'domain';
      domainLink.textContent = item.domain;

      const whoisLink = document.createElement('a');
      whoisLink.href = `https://wxscx.com/${item.domain}`;
      whoisLink.target = '_blank';
      whoisLink.className = 'whois';
      whoisLink.textContent = 'Whois';

      li.appendChild(domainLink);
      li.appendChild(whoisLink);

      if (data.data.registered) {
        lists[item.type].registered.appendChild(li);
      } else {
        lists[item.type].available.appendChild(li);
      }

    } catch(err) {
      console.error('Whois error', item.domain, err);
    }
  }

  alert("Whois 检查完成！");
}

// 一键复制指定列表
function copyToClipboard(listId) {
  const ul = document.getElementById(listId);
  const text = Array.from(ul.children).map(li => li.textContent.replace('Whois','').trim()).join("\n");
  navigator.clipboard.writeText(text).then(() => {
    alert("已复制到剪贴板！");
  }).catch(err => alert("复制失败：" + err));
}
</script>

</body>
</html>
