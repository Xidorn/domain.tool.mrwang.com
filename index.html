<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Name Combiner Pro</title>
    <style>
        :root {
            --primary: #4BB7A8;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container { max-width: 1000px; width: 100%; }

        header { text-align: center; margin-bottom: 40px; }
        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #94a3b8; }

        /* 输入区 */
        .search-box {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            gap: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary); }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #475569; cursor: not-allowed; }

        /* 进度条 */
        .progress-container {
            margin: 20px 0;
            display: none;
        }
        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        #progressFill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        /* 结果布局 */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .column {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        h2 { font-size: 1.2rem; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0 10px;
        }

        .badge {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--border);
        }

        ul {
            list-style: none;
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
        }

        li {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .status-available { color: var(--success); }
        .status-registered { color: #64748b; font-size: 0.9em; }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 4px 8px;
            font-size: 12px;
        }
        .copy-btn:hover { background: var(--primary); color: white; }

        .whois-link {
            text-decoration: none;
            color: var(--primary);
            font-size: 12px;
            margin-left: 10px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Web3 Name Combiner</h1>
        <p>基于本地词库的 .com 域名批量查询工具</p>
    </header>

    <div class="search-box">
        <input type="text" id="inputWord" placeholder="输入核心词 (如: meta, block, bit)...">
        <button onclick="generateCombinations()">1. 生成组合</button>
        <button id="checkBtn" onclick="checkAllWhois()" disabled>2. 开始检查 Whois</button>
    </div>

    <div class="progress-container" id="progressContainer">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:14px;">
            <span id="progressText">准备检查...</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar"><div id="progressFill"></div></div>
    </div>

    <div class="results-grid">
        <div class="column">
            <h2>前缀组合 (Keyword + Word)</h2>
            
            <div class="list-header">
                <span class="status-available">● 可注册</span>
                <button class="copy-btn" onclick="copyAvailable('prefixAvailable')">复制全部</button>
            </div>
            <ul id="prefixAvailable"></ul>

            <div class="list-header">
                <span style="color:#64748b">● 已占用</span>
            </div>
            <ul id="prefixRegistered"></ul>
        </div>

        <div class="column">
            <h2>后缀组合 (Word + Keyword)</h2>
            
            <div class="list-header">
                <span class="status-available">● 可注册</span>
                <button class="copy-btn" onclick="copyAvailable('suffixAvailable')">复制全部</button>
            </div>
            <ul id="suffixAvailable"></ul>

            <div class="list-header">
                <span style="color:#64748b">● 已占用</span>
            </div>
            <ul id="suffixRegistered"></ul>
        </div>
    </div>
</div>

<script>
let words = [];
let prefixDomains = [];
let suffixDomains = [];
const CONCURRENCY_LIMIT = 5; // 同时检查的数量，避免被封IP

// 模拟加载词库（实际使用时请保留你的 fetch 代码）
fetch('word.txt')
    .then(res => res.text())
    .then(data => {
        words = data.split(/\r?\n/).map(w => w.trim()).filter(Boolean);
        console.log(`词库加载成功: ${words.length}条`);
    })
    .catch(err => {
        // 容错：如果读取不到文件，可以使用内置演示词
        words = ['lab', 'hub', 'base', 'dao', 'chain', 'verse', 'net', 'web'];
        console.warn("未找到 word.txt，加载演示词库");
    });

function generateCombinations() {
    const input = document.getElementById("inputWord").value.trim().toLowerCase();
    if (!input) { alert("请输入核心词！"); return; }
    
    prefixDomains = words.map(w => input + w.toLowerCase() + ".com");
    suffixDomains = words.map(w => w.toLowerCase() + input + ".com");

    document.getElementById('checkBtn').disabled = false;
    alert(`生成成功！共计 ${prefixDomains.length + suffixDomains.length} 个组合。`);
}

async function checkAllWhois() {
    const allDomains = [
        ...prefixDomains.map(d => ({ domain: d, type: 'prefix' })),
        ...suffixDomains.map(d => ({ domain: d, type: 'suffix' }))
    ];

    const btn = document.getElementById('checkBtn');
    const progressContainer = document.getElementById('progressContainer');
    const fill = document.getElementById('progressFill');
    const txt = document.getElementById('progressText');
    const percent = document.getElementById('progressPercent');

    // 重置界面
    btn.disabled = true;
    progressContainer.style.display = 'block';
    ['prefixAvailable', 'prefixRegistered', 'suffixAvailable', 'suffixRegistered'].forEach(id => {
        document.getElementById(id).innerHTML = '';
    });

    let completed = 0;
    const total = allDomains.length;

    // 分批异步处理函数
    async function processQueue() {
        while (allDomains.length > 0) {
            const item = allDomains.shift();
            try {
                // 建议使用更稳定的 Whois API
                const res = await fetch(`https://api.mrwang.com/whois.php?domain=${item.domain}`);
                const data = await res.json();
                
                updateUI(item.domain, item.type, data.data.registered);
            } catch (err) {
                console.error("查询失败:", item.domain);
            } finally {
                completed++;
                const p = Math.round((completed / total) * 100);
                fill.style.width = p + '%';
                percent.innerText = p + '%';
                txt.innerText = `正在检查: ${item.domain}`;
            }
        }
    }

    // 启动并发
    const workers = Array(CONCURRENCY_LIMIT).fill(null).map(processQueue);
    await Promise.all(workers);

    txt.innerText = "检查完成！";
    btn.disabled = false;
}

function updateUI(domain, type, isRegistered) {
    const targetId = isRegistered ? `${type}Registered` : `${type}Available`;
    const ul = document.getElementById(targetId);
    
    const li = document.createElement('li');
    li.className = isRegistered ? 'status-registered' : 'status-available';
    
    li.innerHTML = `
        <span>${domain}</span>
        <div>
            <a href="https://www.whois.com/whois/${domain}" target="_blank" class="whois-link">Whois</a>
        </div>
    `;
    
    // 未注册的排在前面
    if (!isRegistered) {
        ul.insertBefore(li, ul.firstChild);
    } else {
        ul.appendChild(li);
    }
}

function copyAvailable(id) {
    const ul = document.getElementById(id);
    const domains = Array.from(ul.querySelectorAll('span')).map(s => s.innerText);
    if (domains.length === 0) return;
    
    navigator.clipboard.writeText(domains.join('\n')).then(() => {
        alert("已复制到剪贴板！");
    });
}
</script>

</body>
</html>
