<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Name Pro - 一键查词</title>
    <style>
        :root {
            --primary: #4BB7A8;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text);
            display: flex; justify-content: center; padding: 40px 20px;
        }

        .container { max-width: 1000px; width: 100%; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin-bottom: 8px; }
        
        /* 交互区 */
        .search-box {
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex; gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        input {
            flex: 1; padding: 14px; border-radius: 8px;
            border: 1px solid var(--border); background: #0b1120;
            color: white; font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--primary); }

        .main-btn {
            padding: 0 30px; border-radius: 8px; border: none;
            background: var(--primary); color: white;
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .main-btn:hover { background: #3aa595; transform: translateY(-1px); }
        .main-btn:disabled { background: #475569; cursor: not-allowed; }

        /* 进度条 */
        .progress-wrap { margin-bottom: 25px; display: none; }
        .bar-bg { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }

        /* 结果展示 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        
        .panel-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .panel-h h2 { font-size: 1.1rem; margin: 0; color: var(--primary); }

        ul { 
            list-style: none; padding: 0; margin: 0; 
            max-height: 350px; overflow-y: auto; 
            background: rgba(0,0,0,0.2); border-radius: 8px;
        }
        li { 
            padding: 10px 15px; border-bottom: 1px solid #33415566; 
            display: flex; justify-content: space-between; font-family: monospace;
        }
        .available { color: var(--success); font-weight: bold; }
        .registered { color: #64748b; }

        .copy-btn {
            background: #334155; color: #cbd5e1; border: none;
            padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .copy-btn:hover { background: var(--primary); color: white; }

        .whois-link { color: #94a3b8; text-decoration: none; font-size: 11px; }
        .whois-link:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Web3 Domain Finder</h1>
        <p>一键合并生成与 Whois 状态检查</p>
    </header>

    <div class="search-box">
        <input type="text" id="inputWord" placeholder="输入词(如: bit, pay, dao)..." onkeypress="if(event.keyCode==13) startCombinedProcess()">
        <button id="runBtn" class="main-btn" onclick="startCombinedProcess()">开始一键检查</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px;">
            <span id="statusTxt">准备中...</span>
            <span id="percentTxt">0%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
    </div>

    <div class="grid">
        <div class="panel">
            <div class="panel-h">
                <h2>前缀 [词+词库]</h2>
                <button class="copy-btn" onclick="copyList('prefixList')">复制未注册</button>
            </div>
            <ul id="prefixList"></ul>
        </div>

        <div class="panel">
            <div class="panel-h">
                <h2>后缀 [词库+词]</h2>
                <button class="copy-btn" onclick="copyList('suffixList')">复制未注册</button>
            </div>
            <ul id="suffixList"></ul>
        </div>
    </div>
</div>

<script>
let words = [];
const CONCURRENCY = 5; // 并发数

// 自动加载词库
fetch('word.txt')
    .then(res => res.text())
    .then(data => {
        words = data.split(/\r?\n/).map(w => w.trim()).filter(Boolean);
        console.log("词库就绪:", words.length);
    })
    .catch(() => {
        words = ['lab', 'hub', 'dao', 'app', 'web3', 'pay', 'box'];
        console.log("使用演示词库");
    });

async function startCombinedProcess() {
    const input = document.getElementById("inputWord").value.trim().toLowerCase();
    if (!input) return alert("请输入内容");
    if (words.length === 0) return alert("词库尚未加载");

    // 1. 初始化界面
    const runBtn = document.getElementById('runBtn');
    const wrap = document.getElementById('progressWrap');
    const prefixUl = document.getElementById('prefixList');
    const suffixUl = document.getElementById('suffixList');
    
    runBtn.disabled = true;
    runBtn.innerText = "正在查询...";
    wrap.style.display = 'block';
    prefixUl.innerHTML = '';
    suffixUl.innerHTML = '';

    // 2. 生成任务队列
    let tasks = [];
    words.forEach(w => {
        tasks.push({ domain: input + w + ".com", type: 'prefix' });
        tasks.push({ domain: w + input + ".com", type: 'suffix' });
    });

    const total = tasks.length;
    let finished = 0;

    // 3. 执行并发查询
    async function worker() {
        while (tasks.length > 0) {
            const item = tasks.shift();
            try {
                const res = await fetch(`https://api.mrwang.com/whois.php?domain=${item.domain}`);
                const data = await res.json();
                renderItem(item.domain, item.type, data.data.registered);
            } catch (e) {
                console.error("查询出错:", item.domain);
            } finally {
                finished++;
                updateProgress(finished, total);
            }
        }
    }

    // 启动多个“工人”同时干活
    await Promise.all(Array(CONCURRENCY).fill(null).map(worker));

    runBtn.disabled = false;
    runBtn.innerText = "再次查询";
    document.getElementById('statusTxt').innerText = "全部检查完成！";
}

function renderItem(domain, type, isReg) {
    const ul = document.getElementById(type === 'prefix' ? 'prefixList' : 'suffixList');
    const li = document.createElement('li');
    li.className = isReg ? 'registered' : 'available';
    // 给未注册的 span 加个特定类名方便复制逻辑抓取
    const domainSpan = isReg ? `<span>${domain}</span>` : `<span class="domain-text">${domain}</span>`;
    
    li.innerHTML = `
        ${domainSpan}
        <a href="https://www.whois.com/whois/${domain}" target="_blank" class="whois-link">WHOIS</a>
    `;
    
    if (!isReg) {
        ul.insertBefore(li, ul.firstChild); // 未注册的置顶
    } else {
        ul.appendChild(li);
    }
}

function updateProgress(done, total) {
    const p = Math.round((done / total) * 100);
    document.getElementById('barFill').style.width = p + '%';
    document.getElementById('percentTxt').innerText = p + '%';
    document.getElementById('statusTxt').innerText = `进度: ${done} / ${total}`;
}

// 修复后的复制功能
function copyList(ulId) {
    const ul = document.getElementById(ulId);
    // 只选取 class 为 domain-text 的内容（即未注册的）
    const domains = Array.from(ul.querySelectorAll('.available .domain-text'))
                         .map(el => el.innerText);
    
    if (domains.length === 0) {
        alert("没有可复制的未注册域名");
        return;
    }

    const text = domains.join('\n');
    navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "已复制！";
        btn.style.background = "#22c55e";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "";
        }, 1500);
    });
}
</script>

</body>
</html>
