<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Name Pro - 一键域名查询</title>
    <style>
        :root {
            --primary: #4BB7A8;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text);
            display: flex; justify-content: center; padding: 40px 20px;
        }

        .container { max-width: 1000px; width: 100%; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin-bottom: 8px; font-weight: 800; }
        
        /* 交互区 */
        .search-box {
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex; gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        input {
            flex: 1; padding: 14px; border-radius: 8px;
            border: 1px solid var(--border); background: #0b1120;
            color: white; font-size: 16px; outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary); }

        .main-btn {
            padding: 0 30px; border-radius: 8px; border: none;
            background: var(--primary); color: white;
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .main-btn:hover { background: #3aa595; transform: translateY(-1px); }
        .main-btn:disabled { background: #475569; cursor: not-allowed; }

        /* 进度条 */
        .progress-wrap { margin-bottom: 25px; display: none; }
        .bar-bg { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }

        /* 结果展示 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        
        .panel-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .panel-h h2 { font-size: 1.1rem; margin: 0; color: var(--primary); }

        ul { 
            list-style: none; padding: 0; margin: 0; 
            max-height: 400px; overflow-y: auto; 
            background: rgba(0,0,0,0.2); border-radius: 8px;
            border: 1px solid #33415544;
        }
        li { 
            padding: 10px 15px; border-bottom: 1px solid #33415566; 
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'JetBrains Mono', monospace; font-size: 14px;
        }
        .available { color: var(--success); font-weight: bold; background: rgba(34, 197, 94, 0.05); }
        .registered { color: #64748b; font-size: 13px; }

        .copy-btn {
            background: #334155; color: #cbd5e1; border: none;
            padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;
            transition: 0.2s;
        }
        .copy-btn:hover { background: var(--primary); color: white; }

        .whois-link { 
            color: #94a3b8; text-decoration: none; font-size: 11px; 
            border: 1px solid #475569; padding: 2px 6px; border-radius: 4px;
        }
        .whois-link:hover { color: var(--primary); border-color: var(--primary); }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Web3 Domain Finder</h1>
        <p>一键组合生成并实时检查域名状态</p>
    </header>

    <div class="search-box">
        <input type="text" id="inputWord" placeholder="输入核心词 (如: meta, block, bit)..." onkeypress="if(event.keyCode==13) startCombinedProcess()">
        <button id="runBtn" class="main-btn" onclick="startCombinedProcess()">一键生成并查询</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px;">
            <span id="statusTxt">初始化任务...</span>
            <span id="percentTxt">0%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
    </div>

    <div class="grid">
        <div class="panel">
            <div class="panel-h">
                <h2>前缀 [核心词 + 词库]</h2>
                <button class="copy-btn" onclick="copyList('prefixList', this)">复制未注册</button>
            </div>
            <ul id="prefixList"></ul>
        </div>

        <div class="panel">
            <div class="panel-h">
                <h2>后缀 [词库 + 核心词]</h2>
                <button class="copy-btn" onclick="copyList('suffixList', this)">复制未注册</button>
            </div>
            <ul id="suffixList"></ul>
        </div>
    </div>
</div>

<script>
// 默认 Web3 词库
let words = ["Alpha","Micro","Meta","Air","Snap","X","Cloud","Blockchain","Crypto","Token","Ledger","Protocol","Consensus","Validator","Node","Chain","Block","Smart","Contract","Oracle","Layer","Bridge","Rollup","Hash","Liquidity","Staking","Yield","Vault","Swap","Lending","Borrow","Pool","Farm","NFT","Mint","Core","Flux","Link","DeFi","Nest","Flow","Pixel","Aura"];
const CONCURRENCY = 6; // 稍微调高一点点并发

// 尝试加载本地 word.txt
fetch('word.txt')
    .then(res => {
        if (!res.ok) throw new Error('Not found');
        return res.text();
    })
    .then(data => {
        const loadedWords = data.split(/\r?\n/).map(w => w.trim()).filter(Boolean);
        if (loadedWords.length > 0) {
            words = loadedWords;
            console.log("已成功加载外部词库 word.txt");
        }
    })
    .catch(() => {
        console.log("未发现 word.txt，已启用内置 Web3 词库");
    });

async function startCombinedProcess() {
    const input = document.getElementById("inputWord").value.trim().toLowerCase();
    if (!input) return alert("请输入核心词！");
    
    // UI 初始化
    const runBtn = document.getElementById('runBtn');
    const wrap = document.getElementById('progressWrap');
    const prefixUl = document.getElementById('prefixList');
    const suffixUl = document.getElementById('suffixList');
    
    runBtn.disabled = true;
    runBtn.innerText = "查询中...";
    wrap.style.display = 'block';
    prefixUl.innerHTML = '';
    suffixUl.innerHTML = '';

    // 生成任务队列
    let tasks = [];
    words.forEach(w => {
        tasks.push({ domain: input + w.toLowerCase() + ".com", type: 'prefix' });
        tasks.push({ domain: w.toLowerCase() + input + ".com", type: 'suffix' });
    });

    const total = tasks.length;
    let finished = 0;

    // 核心并发执行器
    async function worker() {
        while (tasks.length > 0) {
            const item = tasks.shift();
            try {
                // 调用 API 进行 Whois 检查
                const res = await fetch(`https://api.mrwang.com/whois.php?domain=${item.domain}`);
                const data = await res.json();
                
                // 渲染结果
                renderItem(item.domain, item.type, data.data.registered);
            } catch (e) {
                console.warn(`跳过查询失败的域名: ${item.domain}`);
            } finally {
                finished++;
                updateProgress(finished, total);
            }
        }
    }

    // 启动多协程
    const workers = Array(Math.min(CONCURRENCY, tasks.length)).fill(null).map(worker);
    await Promise.all(workers);

    runBtn.disabled = false;
    runBtn.innerText = "一键生成并查询";
    document.getElementById('statusTxt').innerText = "检查已全部完成";
}

function renderItem(domain, type, isReg) {
    const ulId = type === 'prefix' ? 'prefixList' : 'suffixList';
    const ul = document.getElementById(ulId);
    const li = document.createElement('li');
    
    li.className = isReg ? 'registered' : 'available';
    
    // 这里使用 class="domain-name" 标记我们要复制的内容
    const content = isReg 
        ? `<span>${domain}</span>` 
        : `<span class="domain-name">${domain}</span>`;

    li.innerHTML = `
        ${content}
        <a href="https://www.whois.com/whois/${domain}" target="_blank" class="whois-link">WHOIS</a>
    `;
    
    // 未注册的域名（绿色）置顶，已注册的追加到末尾
    if (!isReg) {
        ul.insertBefore(li, ul.firstChild);
    } else {
        ul.appendChild(li);
    }
}

function updateProgress(done, total) {
    const p = Math.round((done / total) * 100);
    document.getElementById('barFill').style.width = p + '%';
    document.getElementById('percentTxt').innerText = p + '%';
    document.getElementById('statusTxt').innerText = `已处理: ${done} / ${total}`;
}

// 修复并优化后的复制功能
function copyList(ulId, btnEl) {
    const ul = document.getElementById(ulId);
    // 关键修复：只选取 .available 类名下带有 .domain-name 的元素
    const elements = ul.querySelectorAll('.available .domain-name');
    const domains = Array.from(elements).map(el => el.innerText);
    
    if (domains.length === 0) {
        alert("列表中没有可注册的域名可以复制");
        return;
    }

    const textToCopy = domains.join('\n');
    
    navigator.clipboard.writeText(textToCopy).then(() => {
        const originalText = btnEl.innerText;
        btnEl.innerText = "复制成功！";
        btnEl.style.background = "#22c55e";
        
        setTimeout(() => {
            btnEl.innerText = originalText;
            btnEl.style.background = "";
        }, 1500);
    }).catch(err => {
        console.error("无法复制: ", err);
        alert("复制失败，请检查浏览器权限");
    });
}
</script>

</body>
</html>
